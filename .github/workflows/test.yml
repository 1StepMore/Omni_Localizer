name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install core deps
        run: python -m pip install litellm translate-toolkit markdown-it-py pydantic PyYAML pytest span-aligner typer jinja2 rich
      - name: Install dev deps
        run: python -m pip install ruff mypy
      - name: Run tests
        run: python -m pytest tests/test_format_guard.py tests/test_routing.py tests/test_config_loader.py tests/test_evaluation_result.py --tb=short -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: python -m pip install litellm translate-toolkit markdown-it-py pydantic PyYAML pytest span-aligner typer jinja2 rich
      - name: Security audit
        run: pip audit --strict || true