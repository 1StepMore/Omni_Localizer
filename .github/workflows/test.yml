name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 ahead of GitHub's forced upgrade on 2026-06-16.
# When removed (post-2026-09-16), this env var becomes a no-op.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install core deps
        run: python -m pip install litellm translate-toolkit markdown-it-py pydantic PyYAML pytest span-aligner typer jinja2 rich pytest-asyncio structlog opentelemetry-api opentelemetry-sdk
      - name: Run core tests
        run: python -m pytest tests/test_format_guard.py tests/test_routing.py tests/test_config_loader.py tests/test_evaluation_result.py tests/test_llm_restorer_interface.py tests/test_retry.py tests/test_concurrent_engine.py --tb=short -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install lint deps
        run: python -m pip install ruff
      - name: Run ruff
        run: ruff check src/ tests/

  test-full:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pip
        run: python -m pip install --upgrade pip
      - name: Install all deps
        run: python -m pip install -e ".[ml,mcp,dev]"
      - name: Run full test suite
        env:
          OMNI_TEST_FAKE_LLM: "1"
        run: python -m pytest tests/ --ignore=tests/test_checkpoint*.py --ignore=tests/test_lqa_judge.py --ignore=tests/test_lqa_scorer.py --ignore=tests/test_lqa_comet.py --ignore=tests/test_tm_service.py --ignore=tests/test_ol_mcp.py --ignore=tests/test_ol_mcp_error_boundary.py --ignore=tests/test_ol_mcp_translate_xliff_bug.py --ignore=tests/test_e2e_behavioral.py --tb=short -v
