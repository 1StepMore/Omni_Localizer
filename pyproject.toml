[tool.poetry]
name = "omni-localizer"
version = "0.1.0"
description = "AI-native localization pipeline with automated quality control"
authors = ["Your Name <you@example.com>"]
readme = "README.md"
license = "MIT"
repository = "https://github.com/your-org/omni-localizer"

packages = [
    { include = "ol_core", from = "src" },
    { include = "ol_md", from = "src" },
    { include = "ol_xliff", from = "src" },
    { include = "ol_buses", from = "src" },
    { include = "ol_config", from = "src" },
    { include = "ol_pool", from = "src" },
    { include = "ol_concurrency", from = "src" },
    { include = "ol_checkpoint", from = "src" },
    { include = "ol_lqa", from = "src" },
    { include = "ol_retry", from = "src" },
    { include = "ol_tm", from = "src" },
    { include = "ol_routing", from = "src" },
]

classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

[tool.poetry.scripts]
ol = "ol_cli:main"

[tool.poetry.dependencies]
python = "^3.10"
litellm = "^1.84.0"
translate-toolkit = "^3.19.9"
markdown-it-py = "^3.0.0"
pydantic = "^2.0.0"
PyYAML = "^6.0.0"
pytest = "^8.0.0"
span-aligner = "^0.3.2"
hypomnema = "^0.8"
openevalkit = "^0.1.7"
sentence-transformers = "^3.0.0"
transformers = "^4.41.0"
typer = { extras = ["all"], version = "^0.15.0" }
jinja2 = "^3.1.0"
rich = "^13.0.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
ruff = "^0.9.0"
mypy = "^1.14.0"
pip-audit = "^2.8.0"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D", "UP", "YTT", "ANN", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T", "TID", "ARG", "P", "PL", "TRY", "NPY", "RUF", "SIM"]
ignore = ["D100", "D104", "ANN101", "ANN102", "PLR0913", "TRY003"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]