[project]
name = "omni-localizer"
version = "0.1.0"
description = "AI-native localization pipeline with automated quality control"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Your Name", email = "you@example.com"}]

dependencies = [
    "litellm>=1.84.0",
    "translate-toolkit>=3.19.9",
    "markdown-it-py>=3.0.0",
    "pydantic>=2.0.0",
    "PyYAML>=6.0.0",
    "pytest>=8.0.0",
    "span-aligner>=0.3.2",
    "hypomnema>=0.8",
    "openevalkit>=0.1.7",
    "typer[all]>=0.15.0",
    "jinja2>=3.1.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
ml = [
    "torch>=2.0.0",
    "sentence-transformers>=3.0.0",
    "transformers>=4.41.0",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "pip-audit>=2.8.0",
]

[project.scripts]
ol = "ol_cli:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "D", "UP", "YTT", "ANN", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T", "TID", "ARG", "P", "PL", "TRY", "NPY", "RUF", "SIM"]
ignore = ["D100", "D104", "ANN101", "ANN102", "PLR0913", "TRY003"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true