# Universal test config - LLM pool only, no language pair
# language pair set via CLI: -s en -t zh or -s zh -t en
# Usage: ol translate-md input.md -c config/test_universal.yaml -s en -t zh
# Or use the .bat files: test_en_to_zh.bat input.md

llm_pool:
  translation:
    - provider: "openai"
      model: "MiniMax-M2.7"
      priority: 1
      role: "translation"
      api_key: "${MINIMAX_API_KEY}"
      base_url: "${MINIMAX_BASE_URL}"
    - provider: "openai"
      model: "ernie-4.5-turbo-32k"
      priority: 2
      role: "translation"
      api_key: "${BAIDU_API_KEY}"
      base_url: "${BAIDU_BASE_URL}"
  judging:
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 1
      role: "judging"
      api_key: "${OPENAI_API_KEY}"
      base_url: null
    - provider: "anthropic"
      model: "claude-3-haiku-20240307"
      priority: 2
      role: "judging"
      api_key: "${ANTHROPIC_API_KEY}"
      base_url: null
  restoration:
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 1
      role: "restoration"
      api_key: "${OPENAI_API_KEY}"
      base_url: null
    - provider: "openai"
      model: "gpt-4o-mini"
      priority: 2
      role: "restoration"
      api_key: "${OPENAI_API_KEY}"
      base_url: null
